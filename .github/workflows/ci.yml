name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sdk_platform: x86_64-linux
          - os: macos-latest
            sdk_platform: arm64-macosx
          - os: windows-latest
            sdk_platform: x64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Amplitude Audio SDK
        id: setup-sdk
        uses: AmplitudeAudio/action-setup-sdk@main
        with:
          platforms: ${{ matrix.sdk_platform }}
          version: nightly
          config: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set AM_SDK_PATH
        shell: bash
        run: echo "AM_SDK_PATH=${{ steps.setup-sdk.outputs.path }}" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: >
          cargo clippy -- -D warnings
          -A clippy::collapsible_if
          -A clippy::question_mark
          -A clippy::result_large_err
          -A clippy::should_implement_trait
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A dead_code
          -A unused_imports
          -A unused_variables

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test
