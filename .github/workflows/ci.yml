name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AM_SDK_REPO: AmplitudeAudio/sdk

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clone Amplitude SDK
        run: git clone --depth 1 https://github.com/${{ env.AM_SDK_REPO }}.git amplitude-sdk

      - name: Set AM_SDK_PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "AM_SDK_PATH=${{ github.workspace }}/amplitude-sdk" >> "$GITHUB_ENV"

      - name: Set AM_SDK_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "AM_SDK_PATH=${{ github.workspace }}\amplitude-sdk" >> $env:GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: >
          cargo clippy -- -D warnings
          -A clippy::collapsible_if
          -A clippy::question_mark
          -A clippy::result_large_err
          -A clippy::should_implement_trait
          -A clippy::too_many_arguments
          -A clippy::type_complexity
          -A dead_code
          -A unused_imports
          -A unused_variables

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test
